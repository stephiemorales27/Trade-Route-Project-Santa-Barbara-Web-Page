<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title> Generador de QR</title> 
<link rel="stylesheet" href="style QR.css"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0" />   
</head> 
<body>  
    <div class="wrapper"> 
        <header>
            <h1> Generador Código QR </h1>
            <p>Pegue una URL o ingrese texto para crear un Código QR</p>
        </header> 
        <div class="form"> 
            <input type="text" placeholder="Enter text or URL"> 
            <button>Genera el QR</button>
        </div>
        <div class="qr-code"> 
            <img src="" alt="qr-code">
        </div>
    </div>  
    <script src="QR generator.js"></script>
</body> 
</html>
